<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ORD System</title>
<meta name="description" content="ORD System — research and product for agentic orchestration. We study systems. We ship them." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23ffffff'/%3E%3Cg fill='none' stroke='%23111111' stroke-width='1.1'%3E%3Cpath d='M4 8 H9 L17 16'/%3E%3Cpath d='M4 16 H17'/%3E%3Cpath d='M4 24 H9 L17 16'/%3E%3C/g%3E%3Cpath d='M17 16 H21' stroke='%23b1402e' stroke-width='1.4'/%3E%3Crect x='20' y='13.5' width='5' height='5' fill='none' stroke='%23111111' stroke-width='1.1'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #111111;
    --ink-45: #8c8c8c;       /* supporting vocabulary ~45% */
    --ink-30: #b3b3b3;
    --line-faint: rgba(17,17,17,0.22);
    --bg: #ffffff;
    --accent: #b1402e;       /* one restrained accent — the spine */
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body { line-height: 1.5; }

  a { color: inherit; text-decoration: none; }

  /* ---------- frame ---------- */
  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 40px;
  }

  /* ---------- nav ---------- */
  nav {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 34px 0;
  }

  .wordmark {
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 0.22em;
    color: var(--ink);
  }

  .nav-links {
    display: flex;
    gap: 30px;
    font-size: 12px;
    letter-spacing: 0.16em;
    color: var(--ink-45);
  }
  .nav-links a {
    text-transform: uppercase;
    padding: 4px 2px;
    transition: color .2s ease;
  }
  .nav-links a:hover,
  .nav-links a:focus-visible { color: var(--ink); }

  a:focus-visible,
  button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  hr.rule {
    border: 0;
    border-top: 1px solid var(--line-faint);
    margin: 0;
  }

  /* ---------- hero / figure ---------- */
  .hero { padding: 70px 0 40px; }

  figure.figure { margin: 0; }

  .figure-svg {
    display: block;
    width: 100%;
    height: auto;
    overflow: visible;
  }

  /* SVG text styling */
  .lbl {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.02em;
    fill: var(--ink-45);            /* supporting vocabulary lighter */
    font-weight: 400;
  }
  .lbl.spine {
    fill: var(--ink);               /* full ink weight */
    font-weight: 700;
  }
  .col-head {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    fill: var(--ink-30);
  }
  .node-lbl {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    fill: var(--ink);
  }
  .read-lbl {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    fill: var(--ink);
  }
  .read-sub {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.03em;
    fill: var(--ink-45);
  }

  /* connector lines */
  .conv {
    fill: none;
    stroke: var(--line-faint);
    stroke-width: 1;
    stroke-linecap: butt;
    stroke-linejoin: miter;
  }
  .conv.spine {
    stroke: var(--accent);
    stroke-width: 1.6;
    opacity: 0.92;
  }
  .node-box {
    fill: var(--bg);
    stroke: var(--ink);
    stroke-width: 1.4;
  }
  .marker { fill: var(--ink); }
  .marker.spine { fill: var(--accent); }

  /* draw-in animation for converging lines */
  .draw {
    stroke-dasharray: var(--len, 600);
    stroke-dashoffset: var(--len, 600);
    animation: draw 1.5s cubic-bezier(.4,0,.2,1) forwards;
    animation-delay: var(--delay, 0s);
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  /* fan-out group: hidden until revealed */
  .fan { opacity: 0; }
  .fan .fan-line {
    stroke-dasharray: var(--len, 300);
    stroke-dashoffset: var(--len, 300);
  }
  .fan.reveal {
    opacity: 1;
    transition: opacity .6s ease;
  }
  .fan.reveal .fan-line {
    animation: draw 1s cubic-bezier(.4,0,.2,1) forwards;
    animation-delay: var(--delay, 0s);
  }
  .fan.reveal .fan-text {
    animation: resolve .8s ease forwards;
    animation-delay: var(--delay, 0s);
    opacity: 0;
  }
  @keyframes resolve { from { opacity: 0; } to { opacity: 1; } }

  /* after reveal, dim the fan so "System" stays dominant */
  .fan.reveal.dim {
    opacity: 0.5;
    transition: opacity 1.2s ease 1.4s;
  }

  /* ---------- tagline ---------- */
  .tagline {
    margin-top: 28px;
    font-size: 15px;
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  .tagline .dot { color: var(--accent); }

  /* ---------- readings caption ---------- */
  .readings-caption {
    padding: 60px 0 20px;
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--ink-45);
    text-transform: uppercase;
    margin: 0;
  }

  /* ---------- one plain line ---------- */
  .plain {
    padding: 26px 0 70px;
    margin: 0;
    font-size: 13px;
    letter-spacing: 0.02em;
    color: var(--ink-45);
    max-width: 660px;
  }
  .plain b { color: var(--ink); font-weight: 500; }

  /* ---------- footer ---------- */
  footer {
    padding: 26px 0 50px;
    display: flex;
    gap: 28px;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-30);
  }
  footer .wm { letter-spacing: 0.22em; color: var(--ink-45); font-weight: 500; }
  footer .spacer { flex: 1; }

  /* ---------- responsive ---------- */
  @media (max-width: 760px) {
    .wrap { padding: 0 20px; }
    nav { padding: 22px 0; }
    .nav-links { gap: 18px; }
    .hero { padding: 36px 0 24px; }
    .readings-caption { padding: 44px 0 16px; }
    .plain { padding: 20px 0 50px; }
    .tagline { font-size: 14px; }
    footer { flex-wrap: wrap; gap: 14px 28px; }
  }

  /* ---------- reduced motion: fully static, fully legible ---------- */
  @media (prefers-reduced-motion: reduce) {
    .draw,
    .fan .fan-line,
    .fan.reveal .fan-line,
    .fan.reveal .fan-text {
      animation: none !important;
      stroke-dashoffset: 0 !important;
      opacity: 1 !important;
    }
    .fan, .fan.reveal.dim { opacity: 1 !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="wrap">

  <nav aria-label="primary">
    <a class="wordmark" href="#top" aria-label="ORD, home">ORD</a>
    <div class="nav-links">
      <a href="#think">Think</a>
      <a href="#theory">Theory</a>
      <a href="#build">Build</a>
    </div>
  </nav>

  <hr class="rule" />

  <main id="top">

    <section class="hero" aria-labelledby="fig-title">
      <figure class="figure">
        <!--
          Canonical figure: LEFT 3 columns (3 words each) -> converge into (System) -> RIGHT 3 readings.
          Connectors = horizontal stubs + slanted straight segments (polylines).
          Spine = accent (ORCHESTRATION / REASONING / DECISION).
          viewBox keeps the left->right composition and scales whole on mobile.
        -->
        <svg class="figure-svg" viewBox="0 0 980 320" role="img"
             preserveAspectRatio="xMidYMid meet"
             aria-labelledby="fig-title fig-desc">
          <title id="fig-title">ORD — Operations, Research, Design converge into one System; read three ways: Think, Theory, Build.</title>
          <desc id="fig-desc">Three columns of vocabulary on the left converge along horizontal and slanted hairlines into a single node labeled System, then fan out to three readings: Think — a way of thinking; Theory — a theory of systems; Build — a system you can run. The spine — Orchestration, Reasoning, Decision — is marked in accent.</desc>

          <!-- ===== column headers ===== -->
          <text class="col-head" x="60"  y="42">OPERATIONS</text>
          <text class="col-head" x="232" y="42">RESEARCH</text>
          <text class="col-head" x="404" y="42">DESIGN</text>

          <!-- ===== LEFT: 9 keyword labels (3 cols x 3 rows) =====
               rows y baseline: top=104, mid=164, bottom=224
               cols x (text-anchor start): 60 / 232 / 404
          -->
          <!-- column 1 : Operations -->
          <text class="lbl"        x="60"  y="104">Operations</text>
          <text class="lbl"        x="60"  y="164">Optimization</text>
          <text class="lbl spine"  x="60"  y="224">Orchestration</text>
          <!-- column 2 : Research -->
          <text class="lbl"        x="232" y="104">Research</text>
          <text class="lbl spine"  x="232" y="164">Reasoning</text>
          <text class="lbl"        x="232" y="224">Resources</text>
          <!-- column 3 : Design -->
          <text class="lbl"        x="404" y="104">Design</text>
          <text class="lbl"        x="404" y="164">Decision</text>
          <text class="lbl spine"  x="404" y="224">Decision</text>

          <!-- ===== convergence lines (declared before node so node sits on top) =====
               Each keyword: short HORIZONTAL stub, then SLANTED straight segment to System.
               System left edge x=700, vertical center y=160.
               Rows above 160 slant DOWN; middle row stays HORIZONTAL; rows below slant UP.
          -->
          <g class="conv-lines">
            <!-- col1 top — Operations (y100) slants down -->
            <polyline class="conv draw" style="--len:660; --delay:.05s" points="158,100 196,100 700,160" />
            <!-- col1 mid — Optimization (y160) horizontal -->
            <polyline class="conv draw" style="--len:540; --delay:.10s" points="168,160 700,160" />
            <!-- col2 top — Research (y100) slants down -->
            <polyline class="conv draw" style="--len:500; --delay:.15s" points="312,100 350,100 700,160" />
            <!-- col2 bot — Resources (y220) slants up -->
            <polyline class="conv draw" style="--len:500; --delay:.20s" points="328,220 350,220 700,160" />
            <!-- col3 top — Design (y100) slants down -->
            <polyline class="conv draw" style="--len:360; --delay:.25s" points="476,100 516,100 700,160" />
            <!-- col3 mid — Decision (y160) horizontal -->
            <polyline class="conv draw" style="--len:320; --delay:.30s" points="484,160 700,160" />

            <!-- ===== SPINE (accent, slightly heavier) ===== -->
            <!-- Orchestration col1 bottom (y220) slants up -->
            <polyline class="conv spine draw" style="--len:680; --delay:.10s" points="168,220 210,220 700,160" />
            <!-- Reasoning col2 mid (y160) horizontal -->
            <polyline class="conv spine draw" style="--len:540; --delay:.10s" points="340,160 700,160" />
            <!-- Decision col3 bottom (y220) slants up -->
            <polyline class="conv spine draw" style="--len:360; --delay:.10s" points="484,220 516,220 700,160" />
          </g>

          <!-- convergence join marker -->
          <rect class="marker spine" x="696" y="156" width="8" height="8" />

          <!-- ===== CENTER: System node ===== -->
          <rect class="node-box" x="706" y="138" width="92" height="44" />
          <text class="node-lbl" x="752" y="165" text-anchor="middle">System</text>

          <!-- ===== fan-out (revealed on scroll) =====
               short HORIZONTAL from System right edge (798,160), then slant/horizontal to readings.
               reading rows y: think=104, theory=160, build=216 ; label x=872 -->
          <g class="fan" id="fan">
            <polyline class="conv fan-line"        style="--len:200; --delay:0s"   points="798,160 832,160 858,104" />
            <polyline class="conv spine fan-line"  style="--len:80;  --delay:.12s" points="798,160 858,160" />
            <polyline class="conv fan-line"        style="--len:200; --delay:.24s" points="798,160 832,160 858,216" />

            <rect class="marker fan-text"       x="854" y="100" width="7" height="7" style="--delay:0s" />
            <rect class="marker spine fan-text" x="854" y="156" width="7" height="7" style="--delay:.12s" />
            <rect class="marker fan-text"       x="854" y="212" width="7" height="7" style="--delay:.24s" />

            <text class="read-lbl fan-text" x="872" y="100" style="--delay:0s">THINK</text>
            <text class="read-sub fan-text" x="872" y="116" style="--delay:0s">a way of thinking</text>

            <text class="read-lbl fan-text" x="872" y="164" style="--delay:.12s">THEORY</text>
            <text class="read-sub fan-text" x="872" y="180" style="--delay:.12s">a theory of systems</text>

            <text class="read-lbl fan-text" x="872" y="216" style="--delay:.24s">BUILD</text>
            <text class="read-sub fan-text" x="872" y="232" style="--delay:.24s">a system you can run</text>
          </g>
        </svg>

        <figcaption class="tagline">
          We study systems. <span class="dot">We ship them.</span>
        </figcaption>
      </figure>
    </section>

    <hr class="rule" />

    <section id="readings" aria-label="readings">
      <p class="readings-caption" id="think">one word, three readings</p>
    </section>

    <p class="plain">
      <b>ORD</b> researches and ships agentic orchestration — many AI agents
      coordinated into one running system. The wedge: <b>reliability</b>.
    </p>

    <hr class="rule" />

    <footer>
      <span class="wm">ORD SYSTEM</span>
      <span class="spacer"></span>
      <span id="theory">Research</span>
      <span id="build">Product</span>
      <span>© 2026</span>
    </footer>

  </main>
</div>

<script>
  (function () {
    var fan = document.getElementById('fan');
    if (!fan) return;

    var reduce = window.matchMedia &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Reduced motion or no observer: reveal statically (CSS keeps it legible).
    if (reduce || !('IntersectionObserver' in window)) {
      fan.classList.add('reveal');
      return;
    }

    var revealed = false;
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting && !revealed) {
          revealed = true;
          fan.classList.add('reveal');
          window.setTimeout(function () { fan.classList.add('dim'); }, 1600);
          io.disconnect();
        }
      });
    }, { threshold: 0.5 });

    io.observe(fan);
  })();
</script>

</body>
</html>
